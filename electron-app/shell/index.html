<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealVerdict</title>
  <link rel="stylesheet" href="shell.css" />
</head>
<body class="dark">
  <div id="app">
    <!-- ─── Sidebar ────────────────────────────────────────────────────── -->
    <aside id="sidebar" class="sidebar">
      <!-- Traffic-light row + drag region (52px) — no buttons here anymore;
           the unified toggle button is fixed-positioned at the window level
           (#sidebarToggle below) so it lives in the SAME spot whether the
           sidebar is open or hidden. -->
      <div class="sidebar-top" id="dragRegion"></div>

      <nav class="nav">
        <!-- Browse: compass icon (Lucide-style) -->
        <button class="nav-item" data-route="/browse" data-active>
          <span class="nav-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
            </svg>
          </span>
          <span class="nav-label">Browse</span>
        </button>

        <!-- Pipeline: layout-grid icon (Lucide-style) -->
        <button class="nav-item" data-route="/pipeline">
          <span class="nav-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3"  y="3"  width="7" height="7" rx="1"/>
              <rect x="14" y="3"  width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
              <rect x="3"  y="14" width="7" height="7" rx="1"/>
            </svg>
          </span>
          <span class="nav-label">Pipeline</span>
        </button>

        <!-- Settings: a real GEAR with teeth (Lucide cog), not a sun -->
        <button class="nav-item" data-route="/settings">
          <span class="nav-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
          <span class="nav-label">Settings</span>
        </button>
      </nav>

      <!-- Account row at the bottom — avatar + email/name -->
      <div class="sidebar-bottom">
        <button id="accountBtn" class="account-row" title="Account">
          <span class="account-avatar" id="accountAvatar">E</span>
          <span class="account-info">
            <span class="account-name" id="accountName">You</span>
            <span class="account-email" id="accountEmail">Signed in</span>
          </span>
        </button>
      </div>

      <!-- Resize handle lives INSIDE the sidebar at right:0 so it stays
           glued to the right edge automatically as the sidebar resizes. -->
      <div id="resizeHandle" class="resize-handle"></div>
    </aside>

    <!-- ─── Content pane ───────────────────────────────────────────────── -->
    <main id="contentPane" class="content-pane"></main>
  </div>

  <!-- ─── Unified sidebar toggle button (always-visible, fixed position) ──
       Lives outside #app at fixed top:12 left:84.  Stays in this exact
       same spot whether sidebar is open or hidden — same icon, just
       toggles the sidebar each click.  Lives in the shell webContents so
       drag regions don't fight the click. -->
  <button id="sidebarToggle" class="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="3" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/>
      <line x1="6" y1="3" x2="6" y2="13" stroke="currentColor" stroke-width="1.4"/>
    </svg>
  </button>

  <script src="shell.js"></script>
</body>
</html>
